name: Validation

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          package-manager-cache: false
      - name: Enable pnpm
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check suite handoff contract conformance
        run: node scripts/generate-handoff-registry.mjs --check
      - name: Validate handoff fixtures
        run: pnpm run verify:handoffs
      - name: Create CI env file
        run: echo "DATABASE_URL=postgresql://registry:registry@localhost:5432/registry" > .env
      - name: Generate Prisma Client
        run: pnpm --filter @registry/webapp db:generate
      - name: Run typecheck
        run: pnpm run typecheck
